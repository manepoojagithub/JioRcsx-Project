services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: advait-sqlserver
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      MSSQL_SA_PASSWORD: "${SQL_SA_PASSWORD}"
    volumes:
      - sqlserver-data:/var/opt/mssql
    ports:
      - "127.0.0.1:1433:1433"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -C -Q \"SELECT 1\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: advait-services-rcs:latest
    container_name: advait-services-web
    restart: unless-stopped
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=JioCxRcsWrapper;User Id=sa;Password=${SQL_SA_PASSWORD};Encrypt=True;TrustServerCertificate=True;MultipleActiveResultSets=true"
      Jwt__Issuer: "${JWT_ISSUER}"
      Jwt__Audience: "${JWT_AUDIENCE}"
      Jwt__SigningKey: "${JWT_SIGNING_KEY}"
      JioCx__BaseUrl: "${JIOCX_BASE_URL}"
      Queue__Enabled: "${QUEUE_ENABLED:-true}"
      Queue__BatchSize: "${QUEUE_BATCH_SIZE:-20}"
      Queue__MaxAttempts: "${QUEUE_MAX_ATTEMPTS:-4}"
      Queue__PollSeconds: "${QUEUE_POLL_SECONDS:-10}"
      DataProtection__KeysPath: "/var/lib/advait-services/keys"
    volumes:
      - web-uploads:/app/wwwroot/uploads
      - dataprotection-keys:/var/lib/advait-services/keys
    ports:
      - "127.0.0.1:5080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  sqlserver-data:
  web-uploads:
  dataprotection-keys:
